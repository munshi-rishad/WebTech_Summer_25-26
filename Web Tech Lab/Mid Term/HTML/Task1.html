<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <form>
            <h1>Event Registration Form</h1>
            <div class="container">
                <fieldset>
                    <legend>Personal Information</legend>

                    <table>
                        <tr>
                            <td><label for="name">Full Name:</label></td>
                            <td><input type="text" id="name" name="name" /></td>
                        </tr>
                        <tr>
                            <td><label for="email">Email:</label></td>
                            <td><input type="email" id="email" name="email" placeholder="@gmail.com" /></td>
                        </tr>
                        <tr>
                            <td><label for="phone">Phone Number:</label></td>
                            <td><input type="tel" id="phone" name="phone" /></td>
                        </tr>
                        <tr>
                            <td><label for="gender">Gender:</label></td>
                            <td>
                                <input type="radio" id="gender" name="gender" value="male" />Male
                                <input type="radio" id="gender" name="gender" value="female" />Female
                                <input type="radio" id="gender" name="gender" value="other" />Other
                            </td>
                        </tr>
                        <tr>
                            <td><label for="dob">Date of Birth:</label></td>
                            <td><input type="date" id="dob" name="dob" /></td>
                        </tr>

                        <tr>
                            <td><label for="time">Time of Birth:</label></td>
                            <td><input type="time" id="time" name="time" /></td>
                        </tr>
                        <tr>
                            <td><label for="country">Country:</label></td>
                            <td>
                                <select id="country" name="country">
                                    <option value="usa">USA</option>
                                    <option value="canada">Canada</option>
                                    <option value="uk">UK</option>
                                    <option value="australia">Australia</option>
                                    <option value="other">Other</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="interests">Interests:</label></td>
                            <td>
                                <input type="checkbox" id="interests" name="interests" value="sports" />Sports
                                <input type="checkbox" id="interests" name="interests" value="music" />Music
                                <input type="checkbox" id="interests" name="interests" value="art" />Art
                                <input type="checkbox" id="interests" name="interests" value="technology" />Technology
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <label for="experience">Experience Level:</label>
                            </td>
                            <td><input type="number" id="experience" name="experience" min="0" max="10" /></td>
                        </tr>

                        <tr>
                            <td><label for="profile Picture">Upload Profile Picture:</label></td>
                            <td><input type="file" id="profile-picture" name="profile-picture" /></td>
                        </tr>
                        <tr>
                            <td><label for="comments">Additional Comments:</label></td>
                            <td>
                                <textarea
                                    id="comments"
                                    name="comments"
                                    rows="4"
                                    cols="20"
                                    style="resize: none"
                                ></textarea>
                            </td>
                        </tr>

                        <tr>
                            <td><label for="terms" style="color: brown">Accept Terms and Conditions:</label></td>
                            <td><input type="checkbox" id="terms" name="terms" /></td>
                        </tr>
                        <tr>
                            <td>
                                <input type="submit" value="Submit" />
                                <input type="reset" value="Reset" />
                                <input type="button" value="Button" />
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </div>
        </form>
    </body>
</html>
